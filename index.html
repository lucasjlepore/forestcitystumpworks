<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <link rel="icon" type="image/png" href="/forestcitystumpworks/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="Book stump removal arrival windows and estimate jobs with Forest City Stump Works." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Forest City" />
    <link rel="apple-touch-icon" sizes="192x192" href="/forestcitystumpworks/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/forestcitystumpworks/icon-512.png" />
    <title>Forest City Stump Works</title>
  </head>
  <body class="bg-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
