<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Book Stump Removal | Forest City Stump Works</title>
    <script type="text/javascript">
      var basePath = '/forestcitystumpworks'
      var search = window.location.search
        ? '&' + window.location.search.slice(1).replace(/&/g, '~and~')
        : ''
      window.location.replace(basePath + '/?/book' + search + window.location.hash)
    </script>
  </head>
  <body></body>
</html>
